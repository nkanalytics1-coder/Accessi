<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione Utenti</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="screen">
  <div class="login-card">
    <h1>Gestione Utenti</h1>
    <p class="subtitle">Pannello Amministrazione</p>
    <form id="login-form">
      <div class="field">
        <label>Username</label>
        <input type="text" id="login-username" autocomplete="username" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" autocomplete="current-password" required>
      </div>
      <div id="login-error" class="error-msg hidden"></div>
      <button type="submit" class="btn btn-primary w-full">Accedi</button>
    </form>
  </div>
</div>

<!-- DASHBOARD -->
<div id="app-screen" class="screen hidden">
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="logo">GU</span>
      <span class="logo-text">Gestione Utenti</span>
    </div>
    <nav>
      <button class="nav-item active" data-tab="users">
        <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        Utenti
      </button>
      <button class="nav-item" data-tab="tools">
        <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
        Tool
      </button>
      <button class="nav-item" data-tab="associations">
        <svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>
        Associazioni
      </button>
      <button class="nav-item" data-tab="logs">
        <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
        Accessi
      </button>
    </nav>
    <div class="sidebar-footer">
      <button id="logout-btn" class="btn btn-ghost">Logout</button>
    </div>
  </aside>

  <main class="content">

    <!-- TAB: UTENTI -->
    <div id="tab-users" class="tab-pane active">
      <div class="page-header">
        <h2>Utenti</h2>
        <button class="btn btn-primary" onclick="openUserModal()">+ Nuovo Utente</button>
      </div>
      <div class="table-wrap">
        <table id="users-table">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Email</th>
              <th>Ruolo</th>
              <th>Tool associati</th>
              <th>Creato</th>
              <th>Azioni</th>
            </tr>
          </thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- TAB: TOOL -->
    <div id="tab-tools" class="tab-pane hidden">
      <div class="page-header">
        <h2>Tool</h2>
        <button class="btn btn-primary" onclick="openToolModal()">+ Nuovo Tool</button>
      </div>
      <div class="table-wrap">
        <table id="tools-table">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Slug</th>
              <th>Descrizione</th>
              <th>URL</th>
              <th>Creato</th>
              <th>Azioni</th>
            </tr>
          </thead>
          <tbody id="tools-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- TAB: ASSOCIAZIONI -->
    <div id="tab-associations" class="tab-pane hidden">
      <div class="page-header">
        <h2>Associazioni Utente — Tool</h2>
      </div>
      <div id="assoc-container"></div>
    </div>

    <!-- TAB: ACCESSI -->
    <div id="tab-logs" class="tab-pane hidden">
      <div class="page-header">
        <h2>Log Accessi</h2>
        <div style="display:flex;gap:10px;align-items:center">
          <select id="logs-filter-user" class="add-tool-select" style="min-width:160px" onchange="filterLogs()">
            <option value="">Tutti gli utenti</option>
          </select>
          <select id="logs-filter-tool" class="add-tool-select" style="min-width:160px" onchange="filterLogs()">
            <option value="">Tutti i tool</option>
          </select>
          <button class="btn btn-ghost btn-sm" onclick="loadLogs()">↺ Aggiorna</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Data / Ora</th>
              <th>Utente</th>
              <th>Tool</th>
              <th>Esito</th>
              <th>IP</th>
              <th>Browser / Device</th>
            </tr>
          </thead>
          <tbody id="logs-tbody"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- MODAL UTENTE -->
<div id="user-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3 id="user-modal-title">Nuovo Utente</h3>
      <button class="modal-close" onclick="closeUserModal()">&#x2715;</button>
    </div>
    <form id="user-form">
      <input type="hidden" id="user-id">
      <div class="field">
        <label>Nome *</label>
        <input type="text" id="user-name" required>
      </div>
      <div class="field">
        <label>Email *</label>
        <input type="email" id="user-email" required>
      </div>
      <div class="field">
        <label>Ruolo</label>
        <select id="user-role">
          <option value="user">User</option>
          <option value="editor">Editor</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="field" id="password-field-wrap">
        <label>Password <span id="password-hint" style="font-weight:400;text-transform:none;color:var(--text-muted)">(lascia vuoto per non modificare)</span></label>
        <input type="password" id="user-password" autocomplete="new-password" placeholder="••••••••">
      </div>
      <div id="send-reset-wrap" class="field hidden">
        <label class="checkbox-label" style="border:none;padding:0">
          <input type="checkbox" id="send-reset-on-create">
          Invia email per impostare la password
        </label>
      </div>
      <div id="tools-select-wrap" class="field hidden">
        <label style="display:flex;align-items:center;justify-content:space-between">
          Tool
          <label class="checkbox-label" style="border:none;padding:0;font-size:12px;text-transform:none;letter-spacing:0;font-weight:500">
            <input type="checkbox" id="select-all-tools"> Seleziona tutti
          </label>
        </label>
        <div id="tools-checkboxes" class="tools-select-grid"></div>
      </div>
      <div id="user-form-error" class="error-msg hidden"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeUserModal()">Annulla</button>
        <button type="submit" class="btn btn-primary">Salva</button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL CAMBIO PASSWORD -->
<div id="change-pw-modal" class="modal-overlay hidden">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <h3>Cambia Password</h3>
      <button class="modal-close" onclick="closeChangePwModal()">&#x2715;</button>
    </div>
    <form id="change-pw-form">
      <input type="hidden" id="change-pw-user-id">
      <p id="change-pw-user-name" style="color:var(--text-muted);font-size:13px;margin-bottom:16px"></p>
      <div class="field">
        <label>Nuova Password *</label>
        <input type="password" id="change-pw-password" placeholder="Min 6 caratteri" required autocomplete="new-password">
      </div>
      <div class="field">
        <label>Conferma Password *</label>
        <input type="password" id="change-pw-confirm" placeholder="Ripeti la password" required autocomplete="new-password">
      </div>
      <div id="change-pw-error" class="error-msg hidden"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeChangePwModal()">Annulla</button>
        <button type="submit" class="btn btn-primary">Salva Password</button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL TOOL -->
<div id="tool-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3 id="tool-modal-title">Nuovo Tool</h3>
      <button class="modal-close" onclick="closeToolModal()">&#x2715;</button>
    </div>
    <form id="tool-form">
      <input type="hidden" id="tool-id">
      <div class="field">
        <label>Nome *</label>
        <input type="text" id="tool-name" required>
      </div>
      <div class="field">
        <label>Slug *</label>
        <input type="text" id="tool-slug" required placeholder="es. entity-matrix">
      </div>
      <div class="field">
        <label>Descrizione</label>
        <input type="text" id="tool-description">
      </div>
      <div class="field">
        <label>URL</label>
        <input type="url" id="tool-url" placeholder="https://...">
      </div>
      <div id="tool-form-error" class="error-msg hidden"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeToolModal()">Annulla</button>
        <button type="submit" class="btn btn-primary">Salva</button>
      </div>
    </form>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>
</body>
</html>
